services:
  openclaw-pishell-lab:
    build:
      context: .
      dockerfile: Dockerfile
    image: openclaw-pishell-lab:latest
    container_name: openclaw-pishell-lab
    restart: "no"
    init: true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - "127.0.0.1:18889:18789"
    env_file:
      - path: .env
        required: false
    environment:
      - HOME=/home/node
      - TERM=xterm-256color
      - OPENCLAW_ALLOW_INSECURE_PRIVATE_WS=1
      - NODE_COMPILE_CACHE=/var/tmp/openclaw-compile-cache
      - OPENCLAW_NO_RESPAWN=1
    command: ["node", "openclaw.mjs", "gateway", "--bind", "lan", "--port", "18789"]
    volumes:
      # OpenClaw lab state. This directory is intentionally local and ignored.
      - ./config:/home/node/.openclaw
      - ./auth-profile-secrets:/home/node/.config/openclaw

      # Repo under test. Default assumes this compose file is used in-place from
      # plugins/openclaw/examples/docker-lab inside the pi-shell-acp checkout.
      - ${PI_SHELL_ACP_REPO:-../../../..}:/home/node/repos/gh/pi-shell-acp:rw
      - ${PI_SHELL_ACP_REPO:-../../../..}:/home/junghan/repos/gh/pi-shell-acp:rw

      # Advanced β path: expose the operator's pi overlay and backend auth into
      # the container. For a public/default α smoke, replace these with named
      # volumes and login inside the container.
      - ${HOME}/.pi/agent:/home/node/.pi/agent:rw
      - ${HOME}/.pi/agent:/home/junghan/.pi/agent:rw
      - ${HOME}/.claude:/home/node/.claude:rw
      - ${HOME}/.codex:/home/node/.codex:rw
      - ${HOME}/.gemini:/home/node/.gemini:rw
